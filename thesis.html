<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }

</head>
<body class="bg-white text-neutral-900 font-sans antialiased min-h-screen flex flex-col">

    <!-- Nav -->
    <nav class="border-b border-neutral-100">
        <div class="max-w-3xl mx-auto px-6 h-14 flex items-center justify-between">

        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-6 py-20">
        <div class="max-w-md w-full text-center">

            <div id="form-container">

    </footer>

    <script>
    document.getElementById('thesis-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value;
        document.getElementById('form-container').innerHTML = '<div class="bg-neutral-50 border border-neutral-200 rounded-xl p-6"><p class="font-semibold mb-1">Opening the thesis...</p><p class="text-sm text-neutral-500">If it doesn\'t open, <a href="https://docs.google.com/document/d/1hUBzmWBJrwSmMBw0OTtJCEMy305jEeweEExjvJoele4/" target="_blank" class="underline">click here</a>.</p></div>';
