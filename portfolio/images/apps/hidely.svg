<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#backgroundGradient)"/>
  
  <!-- Main Icon Shape -->
  <g transform="translate(64, 64)">
    <!-- Outer Ring -->
    <circle cx="192" cy="192" r="160" fill="none" stroke="white" stroke-width="12" opacity="0.9"/>
    
    <!-- Inner Core -->
    <circle cx="192" cy="192" r="80" fill="url(#coreGradient)"/>
    
    <!-- Automation Arrows -->
    <g opacity="0.95">
      <!-- Top Arrow -->
      <path d="M192 32 L216 56 L208 64 L192 48 L176 64 L168 56 Z" fill="white"/>
      
      <!-- Right Arrow -->
      <path d="M352 192 L328 168 L320 176 L336 192 L320 208 L328 216 Z" fill="white"/>
      
      <!-- Bottom Arrow -->
      <path d="M192 352 L168 328 L176 320 L192 336 L208 320 L216 328 Z" fill="white"/>
      
      <!-- Left Arrow -->
      <path d="M32 192 L56 216 L64 208 L48 192 L64 176 L56 168 Z" fill="white"/>
    </g>
    
    <!-- Central "H" for Hidely -->
    <g fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="48">
      <text x="192" y="200" text-anchor="middle" dominant-baseline="middle">H</text>
    </g>
    
    <!-- Orbital Elements -->
    <g opacity="0.7">
      <circle cx="192" cy="128" r="8" fill="white"/>
      <circle cx="256" cy="192" r="8" fill="white"/>
      <circle cx="192" cy="256" r="8" fill="white"/>
      <circle cx="128" cy="192" r="8" fill="white"/>
    </g>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8" />
    </radialGradient>
  </defs>
</svg>